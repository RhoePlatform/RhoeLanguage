<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Planning Sheet</title>
    <link rel="stylesheet" href="../../../reference-packs/rhoeHtmlCore/rhoe-core.css">
  </head>
  <body>
    <article class="rhoe-artifact rhoe-carrier-sheet" data-rhoe-node="Artifact" data-rhoe-carrier="sheetField" data-rhoe-genre="ext.sheetWorkspace" data-rhoe-composition-grammar="sheet/default" id="planning-sheet">
      <section class="rhoe-front-matter" data-rhoe-node="FrontMatter">
        <header class="rhoe-top-band" data-rhoe-node="TopBand">Working assumptions and owner notes.</header>
      </section>
      <section class="rhoe-main-matter" data-rhoe-node="MainMatter">
        <section class="rhoe-section" data-rhoe-node="Section">
          <section class="rhoe-sheet" data-rhoe-node="Sheet">
            <section class="rhoe-region" data-rhoe-node="Region" id="worksheet-main">Primary worksheet region.</section>
          </section>
        </section>
      </section>
      <section class="rhoe-back-matter" data-rhoe-node="BackMatter">
        <footer class="rhoe-bottom-band" data-rhoe-node="BottomBand">
          <a class="rhoe-ref" data-rhoe-node="Reference" href="#worksheet-main">Main workspace</a>
        </footer>
      </section>
    </article>
  </body>
</html>
