<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RhoeHTML Viewer Template</title>
    <link rel="stylesheet" href="../rhoe-core.css">
    <link rel="stylesheet" href="../rhoe-theme-default.css">
  </head>
  <body class="rhoe-viewer" data-rhoe-profile="viewer">
    <header class="rhoe-viewer-toolbar" data-rhoe-node="ViewerChrome">
      <p>Use Left/Right, Home/End, and P for presenter mode.</p>
      <p data-rhoe-viewer-status>Frame 1 of 1</p>
    </header>
    <article class="rhoe-artifact rhoe-viewer" data-rhoe-node="Artifact" data-rhoe-profile="viewer">
      <section class="rhoe-main-matter" data-rhoe-node="MainMatter">
        <section class="rhoe-frameset" data-rhoe-node="FrameSet" id="viewer-template">
          <section class="rhoe-frame" data-rhoe-node="Frame" data-rhoe-shell-role="summaryTakeaway" id="viewer-template-1">
            <div class="rhoe-zone" data-rhoe-node="Zone" data-rhoe-role="main">
              Viewer template body content.
            </div>
          </section>
        </section>
      </section>
    </article>
    <script src="../rhoe-core.js"></script>
  </body>
</html>
