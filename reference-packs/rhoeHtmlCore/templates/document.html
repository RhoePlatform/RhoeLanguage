<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RhoeHTML Document Template</title>
    <link rel="stylesheet" href="../rhoe-core.css">
    <link rel="stylesheet" href="../rhoe-theme-default.css">
  </head>
  <body class="rhoe-document" data-rhoe-profile="document">
    <article class="rhoe-artifact rhoe-document" data-rhoe-node="Artifact" data-rhoe-profile="document">
      <section class="rhoe-front-matter" data-rhoe-node="FrontMatter">
        Document template front matter.
      </section>
      <section class="rhoe-main-matter" data-rhoe-node="MainMatter">
        Document template body content.
      </section>
      <section class="rhoe-back-matter" data-rhoe-node="BackMatter">
        Document template back matter.
      </section>
    </article>
  </body>
</html>
